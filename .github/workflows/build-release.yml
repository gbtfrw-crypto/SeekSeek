name: Build & Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="0.0.0-${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Patch version in build.py
        shell: bash
        run: sed -i "s/^VERSION = .*/VERSION = \"${{ steps.version.outputs.version }}\"/" build.py

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build
        run: python build.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SeekSeek-${{ steps.version.outputs.version }}-windows
          path: |
            dist/SeekSeek-${{ steps.version.outputs.version }}-Portable.zip
            dist/SeekSeek-${{ steps.version.outputs.version }}-Setup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SeekSeek-${{ steps.version.outputs.version }}-Portable.zip
            dist/SeekSeek-${{ steps.version.outputs.version }}-Setup.exe
          generate_release_notes: true
