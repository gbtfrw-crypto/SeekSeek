name: Build and Release Windows Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve app version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $version = "0.0.0-${{ github.run_number }}"
          }
          else {
            $version = $tag -replace '^v', ''
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $version"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          else {
            pip install pyinstaller PyQt6 PyMuPDF olefile openpyxl python-docx python-pptx lxml
          }

      - name: Build app with PyInstaller
        shell: pwsh
        run: pyinstaller seekseek.spec --noconfirm

      - name: Create portable zip
        shell: pwsh
        run: |
          if (!(Test-Path dist/SeekSeek)) {
            throw "dist/SeekSeek 폴더가 없습니다. PyInstaller 결과를 확인하세요."
          }
          $zipName = "SeekSeek-${{ steps.version.outputs.version }}-Portable.zip"
          if (Test-Path "dist/$zipName") {
            Remove-Item "dist/$zipName" -Force
          }
          Compress-Archive -Path dist/SeekSeek/* -DestinationPath "dist/$zipName"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:/Program Files (x86)/Inno Setup 6/ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe를 찾을 수 없습니다: $iscc"
          }
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" "installer.iss"

      - name: Collect artifact paths
        id: artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipPath = "dist/SeekSeek-$version-Portable.zip"
          $setupPath = "dist/SeekSeek-$version-Setup.exe"

          if (!(Test-Path $zipPath)) {
            throw "포터블 ZIP을 찾을 수 없습니다: $zipPath"
          }
          if (!(Test-Path $setupPath)) {
            throw "인스톨러 EXE를 찾을 수 없습니다: $setupPath"
          }

          "zip=$zipPath" >> $env:GITHUB_OUTPUT
          "setup=$setupPath" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SeekSeek-${{ steps.version.outputs.version }}-windows
          path: |
            ${{ steps.artifacts.outputs.zip }}
            ${{ steps.artifacts.outputs.setup }}

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.zip }}
            ${{ steps.artifacts.outputs.setup }}
          generate_release_notes: true
